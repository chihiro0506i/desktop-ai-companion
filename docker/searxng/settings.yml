# Local SearXNG settings for the desktop pet web-search bridge.
# SEARXNG_SECRET from docker-compose overrides server.secret_key.

use_default_settings: true

general:
  debug: false
  instance_name: "Local Desktop Pet Search"

search:
  safe_search: 1
  autocomplete: ""
  formats:
    - html
    - json

server:
  secret_key: "change-me-local-development-only"
  limiter: false
  image_proxy: false
  bind_address: "0.0.0.0"
  port: 8080

ui:
  static_use_hash: true
