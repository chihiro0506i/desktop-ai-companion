services:
  searxng:
    image: searxng/searxng:latest
    container_name: local-llm-desktop-pet-searxng
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://localhost:8080/}
      SEARXNG_SECRET: ${SEARXNG_SECRET:-change-me-local-development-only}
    volumes:
      - ./docker/searxng/settings.yml:/etc/searxng/settings.yml:ro
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
